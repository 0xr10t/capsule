[package]
name = "capsule-proof-engine"
version = "0.1.0"
edition = "2021"
description = "Deterministic Merkle range proofs for Capsule disclosure artifacts"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
wasm-bindgen = "0.2"

[dev-dependencies]
pretty_assertions = "1"

